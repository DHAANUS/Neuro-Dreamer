envname: SuperMarioBros-v0
run_name: SuperMarioBrosNes
seed: 1

gradientSteps: 60000
replayRatio: 1
saveMetrics: True
saveCheckpoints: True
checkpointInterval: 200
resume: False
checkpointLoad: 50k

use_foveation: False
episodedbeforestart: 20
numInteractionEpisode: 3
numEvaluationEpisode: 1

dreamer:
    batchsize: 64
    batchlength: 64
    imaginehorizon: 25

    recurrentSize: 512
    latentlength: 16
    latentclasses: 5
    encodedObjSize: 1024

    useContinuationPred: False
    actorLR: 0.00004
    criticLR: 0.0001
    worldmodelLR: 0.0002
    gradientNormType: 2
    gradientClip: 100

    discount: 0.996
    lambda_: 0.95
    freeNats: 0.1
    betaPrior: 0.8
    betaPosterior: 0.8
    entropyScale: 0.01

    buffer:
        capacity: 50000

    encoder:
        depth: 16
        stride: 2
        kernelSize: 4
        activation: ELU

    decoder:
        depth: 16
        stride: 2
        kernelSize: 4
        activation: ELU

    recurrentModel:
        hiddenSize: 200
        activation: ELU

    priorModel:
        hiddenSize: 200
        hiddenLayers: 2
        activation: ELU
        uniformMix: 0.01

    posterior:
        hiddenSize: 200
        hiddenLayers: 2
        activation: ELU
        uniformMix: 0.01

    rewardModel:
        hiddenSize: 400
        hiddenLayers: 2
        activation: ELU

    continuationModel:
        hiddenSize: 400
        hiddenLayers: 3
        activation: ELU

    actorModel:
        hiddenSize: 400
        hiddenLayers: 2
        tau: 1.0
        activation: ELU

    criticModel:
        hiddenSize: 400
        hiddenLayers: 3
        activation: ELU

folderName:
    metricFolder: metrics
    plotsfolder: plots
    checkpointFolder: checkpoints
    videoFolder: videos
